name: Investing Scraper
on:
  schedule:
    - cron: '0 0 * * *' # Runs daily at midnight
  workflow_dispatch:      # Allows you to click "Run workflow" manually

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Essential for pushing the CSV back to the repo
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          pip install seleniumbase dateparser
          sudo apt-get update
          sudo apt-get install -y xvfb
          sbase install chromedriver

      - name: Run Scraper
        run: python main.py
        env:
          PYTHONUNBUFFERED: 1

      - name: Commit and Push Results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Remove SeleniumBase lock files before committing
          rm -rf downloaded_files/
          find . -name "*.lock" -delete
          
          git add .
          # Only commit if the CSV actually changed
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update: $(date +'%Y-%m-%d %H:%M')" && git push)