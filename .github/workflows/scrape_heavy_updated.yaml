name: Investing Multi-Ticker Scraper
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          pip install seleniumbase dateparser
          sudo apt-get update
          sudo apt-get install -y xvfb
          sbase install chromedriver

      - name: Run Scraper
        run: python main_heavy_updated.py
        env:
          PYTHONUNBUFFERED: 1

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Remove SeleniumBase temp files
          rm -rf downloaded_files/
          find . -name "*.lock" -delete
          
          git add data/
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update ticker data" && git push)